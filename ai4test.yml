data:
        code: "\nimport json\nimport re\n\n\ndef extract_json_from_text(text):\n \
          \   # 1. 预处理\n    if not isinstance(text, str):\n        text = str(text)\n\
          \n    # 2. 清洗 Markdown 代码块标记\n    text_clean = re.sub(r'^\\s*', '',\
          \ text, flags=re.MULTILINE)\n    text_clean = re.sub(r'^\\s*', '', text_clean,\
          \ flags=re.MULTILINE)\n    text_clean = re.sub(r'$', '', text_clean,\
          \ flags=re.MULTILINE)\n    text_clean = text_clean.strip()\n    \n    #\
          \ 3. 尝试直接解析\n    try:\n        return json.loads(text_clean)\n    except\
          \ json.JSONDecodeError:\n        pass\n\n    # 4. 提取最后一个 { 与最后一个 } 之间的内容\n\
          \    last_lbrace = text.rfind('{')\n    last_rbrace = text.rfind('}')\n\
          \    if last_lbrace != -1 and last_rbrace != -1 and last_lbrace < last_rbrace:\n\
          \        json_str = text[last_lbrace:last_rbrace+1]\n        try:\n    \
          \        return json.loads(json_str)\n        except json.JSONDecodeError:\n\
          \            pass\n\n    # 5. 提取最后一个sql ... 代码块内容\n    sql_blocks\
          \ = re.findall(r'sql\\s*([\\s\\S]?)', text, re.IGNORECASE)\n    if\
          \ sql_blocks:\n        return sql_blocks[-1].strip()\n\n    # 6. 没有返回空字典\n\
          \    return {}\n\n\ndef main(sql: str, item: dict, need_generate_sql: bool):\n\
          \    if need_generate_sql:\n        sql_dict = extract_json_from_text(sql)\n\
          \        sql = sql_dict.get('sql') if sql_dict.get('sql') else sql\n   \
          \ else:\n        sql = item.get('eval_step_descri', '')\n    return {\n\
          \        \"sql\": sql\n    }\n"
