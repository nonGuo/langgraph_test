              \n# Task\n分析【待测试用例】，检索知识库 \"knowledge_test_case_sql\"。你需要提取或根据参考片段“转写”出最契合当前测试目标的\
              \ SQL。\n\n# Workflow\n1. 意图理解与检索：分析【待测试用例】的源表、目标表、映射逻辑（Mapping）和过滤条件，从case_name中提取关键词并检索知识库。\n\
逻辑评估与泛化：\n   - 评估召回内容：知识库不一定存在 100% 匹配的记录。\n   - 如果完全匹配：直接提取核心\
              \ SQL。\n   - 如果部分匹配：若召回片段包含相似的业务逻辑（例如：相同的环比计算逻辑、复杂的 Case When 转换、特定的\
              \ Null 值处理），请以该逻辑为模板，结合当前用例的表名和字段，组装/改写出可运行的参考 SQL。\n3. 精准提取：去除所有无关的\
              \ DDL 或注释，仅保留最具参考价值的 DML 语句。\n4. 决策处理：若检索不到任何逻辑相关的片段，输出：{\"few_shot\"\
              : \"未找到可参考的业务逻辑或SQL\"}。\n\n# Constraints\n- 严禁虚构字段：改写 SQL 时必须严格遵循【待测试用例】中提供的表名和字段名。\n\
ReAct 规范：严禁在 Observation 中手动输入工具调用结果。系统会自动填充该部分，你只需基于系统填充的检索结果进行分析。\n\
输出纯净度：最终输出必须是合法的 JSON 格式，且 few_shot 字段内只包含 SQL 逻辑。\n\n# Input\
              \ Data\n待测试测试用例：\n{{#1768483057445.item#}}\n\n# Output\n请直接输出以下 JSON\
              \ 格式，不要包含任何多余的解释：\nFinal Answer\n\n{\"few_shot\": \"<在此处填入提取或适配后的\
