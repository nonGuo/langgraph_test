data:
        code: "\n\nimport json\nimport re\n\ndef extract_json_from_text(text):\n \
          \   # 匹配第一个 [ 与最后一个 ] 之间的内容（包括[]本身）\n    match = re.search(r'\\[(.)\\]',\
          \ text, re.DOTALL)\n    if match:\n        json_str = '[' + match.group(1)\
          \ + ']'\n        return json.loads(json_str)\n    else:\n        raise ValueError(\"\
          未找到有效的 JSON 列表格式内容！\")\n\ndef main(input_list: str) -> dict:\n    \"\"\"\
          \n    将 List of JSON 转换为 Markdown Table 字符串\n    输入示例: [{\"name\": \"Alice\"\
          , \"age\": 25}, {\"name\": \"Bob\", \"age\": 30}]\n    \"\"\"\n    input_list\
          \ = extract_json_from_text(input_list)\n    if not input_list:\n       \
          \ return {\"md_output\": \"暂无数据\"}\n    \n    # 1. 获取表头（默认取第一个对象的 keys）\n\
          \    headers = list(input_list[0].keys())\n    \n    # 2. 构建 Markdown 表头\n\
          \    # 格式: | Name | Age |\n    md_table = \"| \" + \" | \".join(headers)\
          \ + \" |\\n\"\n    \n    # 3. 构建分割线\n    # 格式: | --- | --- |\n    md_table\
          \ += \"| \" + \" | \".join([\"---\"] * len(headers)) + \" |\\n\"\n    \n\
          \    # 4. 遍历数据构建行\n    for item in input_list:\n        row_values = []\n\
          \        for h in headers:\n            # 处理可能缺失的字段，并转为字符串，防止 Markdown 错乱\n\
          \            val = str(item.get(h, \"\"))\n            # 简单的转义，防止内容中有 |\
          \ 破坏表格\n            val = val.replace(\"|\", \"\\\\|\").replace(\"\\n\"\
          , \"<br>\") \n            row_values.append(val)\n        md_table += \"\
\" + \" | \".join(row_values) + \" |\\n\"\n        \n    return {\n  \
          \      \"md_output\": md_table\n    }\n"
