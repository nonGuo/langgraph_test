data:
        code: "import json\nimport re\n\n\ndef extract_json_from_text(text):\n   \
          \ # 1. 保证输入为字符串\n    if not isinstance(text, str):\n        text = str(text)\n\
          \n    # 2. 查找所有json ... 代码块\n    # 非贪婪匹配json 开头, 直到下一个 \n\
